name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── Required check: tests must pass before any build ──────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts skips the postinstall that rebuilds better-sqlite3;
        # tests don't use native modules so this is safe and faster.
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm run test

      - name: Type check
        run: npm run typecheck

  # ── Build installers (only on version tags, only if tests pass) ───────────
  build:
    name: Build (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      # Don't cancel other OS builds if one fails — we want all three artifacts
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (skip postinstall — rebuild handled below)
        # postinstall runs electron-rebuild, which requires native toolchain.
        # We install toolchain first then rebuild explicitly in the next step.
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build Electron app
        run: npm run build

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update -y && sudo apt-get install -y fakeroot rpm dpkg

      - name: Package installer (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attendguard-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.rpm
          retention-days: 30

  # ── Publish to GitHub Releases ────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    # Run as long as the build matrix wasn't fully cancelled — publish
    # whichever platform artifacts were successfully built.
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
