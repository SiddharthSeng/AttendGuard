name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── Required check: tests must pass before any build ──────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts skips the postinstall that rebuilds better-sqlite3;
        # tests don't use native modules so this is safe and faster.
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm run test

      - name: Type check
        run: npm run typecheck

  # ── Windows build ──────────────────────────────────────────────────────────
  build-win:
    name: Build (windows-latest)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build Electron app
        run: npm run build

      - name: Package installer (win)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: npx electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attendguard-win-${{ github.ref_name }}
          path: release/**/*Setup*.exe
          retention-days: 30

  # ── macOS build ───────────────────────────────────────────────────────────
  build-mac:
    name: Build (macos-latest)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build Electron app
        run: npm run build

      - name: Package installer (mac)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: npx electron-builder --mac --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attendguard-mac-${{ github.ref_name }}
          path: release/**/*.dmg
          retention-days: 30

  # ── Linux build ───────────────────────────────────────────────────────────
  build-linux:
    name: Build (ubuntu-latest)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux packaging system dependencies
        # fakeroot + dpkg-dev: needed for .deb builds
        # rpm: electron-builder uses it internally even for non-RPM targets
        # libarchive-tools: needed by AppImage tooling
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot dpkg-dev rpm libarchive-tools

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build Electron app
        run: npm run build

      - name: Package installer (linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attendguard-linux-${{ github.ref_name }}
          path: |
            release/**/*.AppImage
            release/**/*.deb
          retention-days: 30

  # ── Publish to GitHub Releases ────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-win, build-mac, build-linux]
    # Publish whichever platform artifacts were successfully built.
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.build-win.result == 'success' || needs.build-mac.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
