# This file only overrides artifactName per target so installers always have
# version-independent filenames (enabling stable /releases/latest/download/ URLs).
# All other build config lives in package.json#build.
nsis:
  artifactName: AttendGuard-Setup.exe
  shortcutName: AttendGuard
  uninstallDisplayName: AttendGuard
  createDesktopShortcut: always
dmg:
  artifactName: AttendGuard.dmg
appImage:
  artifactName: AttendGuard.AppImage
deb:
  artifactName: AttendGuard.deb
